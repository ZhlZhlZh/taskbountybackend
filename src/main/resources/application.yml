server:
  port: 8080

spring:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  servlet:
    multipart:
      max-file-size: 30MB
      max-request-size: 35MB

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

# JWT Configuration
jwt:
  secret: TaskBountyPlatformSecretKeyForJWTTokenGeneration2026FirstTeamBIT
  expiration: 86400000  # 24 hours

# File Upload Configuration
file:
  upload:
    base-dir: ./uploads
    avatar-max-size: 1048576    # 1MB
    avatar-width: 225
    avatar-height: 225
    attachment-max-size: 20971520  # 20MB
    delivery-max-size: 31457280    # 30MB
    max-files-per-task: 3

# Platform Configuration Defaults
platform:
  credit:
    initial-score: 80
    min-score: 0
    max-score: 100
    warning-threshold: 60
    restrict-threshold: 40
    completion-rate-good: 90
    completion-rate-bad: 70
    completion-good-score: 5
    completion-bad-score: -5
    praise-rate-good: 95
    praise-rate-bad: 80
    praise-good-score: 3
    praise-bad-score: -3
    overtime-penalty: -8
    voluntary-quit-penalty: -3
    publisher-cancel-penalty: -5
  task:
    auto-cancel-days: 14
    reminder-hours: 24
    extend-ratio: 50
    max-extend-times: 2
    auto-confirm-hours: 72
  attachment:
    save-days: 30
    max-file-size: 20971520
    max-delivery-size: 31457280
  initial-points: 1000
  nickname-modify-cooldown-days: 30
  freeze-duration-days: 40
  max-concurrent-orders: 3
  user-sync-cron: "0 0 3 1 * ?"  # Monthly on 1st at 3:00 AM
